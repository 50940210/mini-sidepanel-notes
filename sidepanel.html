<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes Panel</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 12px;
      }

      textarea {
        width: 100%;
        height: 70vh;
        box-sizing: border-box;
        resize: vertical;
        padding: 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: white;
      }
    </style>
  </head>
  <body>
    <h1>My Notes</h1>
    <textarea placeholder="Type something here..."></textarea>

    <script src="sidepanel.js"></script>
  </body>
</html>
